spring:
  application:
    name: order-payment-system
  profiles:
    active: dev
server:
  port: 9091

# Common Kafka Topics (used by all profiles)
kafka:
  topics:
    order: order-topic
    payment: payment-topic
    payment-failed: payment-failed-topic
    notification: notification-topic

  consumer:
    group:
      payment: payment-group
      notification: notification-group

# Security
app:
  security:
    admin:
      username: ${SECURITY_ADMIN_USER:admin}
      password: ${SECURITY_ADMIN_PASSWORD:admin123}
    user:
      username: ${SECURITY_USER_USER:user}
      password: ${SECURITY_USER_PASSWORD:user123}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.example.orderpayment: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
  file:
    name: logs/application.log



