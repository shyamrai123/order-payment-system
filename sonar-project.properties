# ============================================================
# sonar-project.properties
# SonarQube configuration for Order Payment System
# ============================================================

sonar.projectKey=order-payment-system
sonar.projectName=Order Payment System
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java binaries (compiled classes)
sonar.java.binaries=target/classes

# Test binaries
sonar.java.test.binaries=target/test-classes

# JaCoCo coverage report
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions ? don't scan generated/config files
sonar.exclusions=\
  **/model/**,\
  **/entity/**,\
  **/dto/**,\
  **/config/**,\
  **/exception/**,\
  **/*Application.java,\
  **/target/**

# Test exclusions from coverage
sonar.coverage.exclusions=\
  **/model/**,\
  **/entity/**,\
  **/dto/**,\
  **/config/**,\
  **/exception/**,\
  **/*Application.java